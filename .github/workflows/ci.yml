name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-app:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Check python syntax
        run: python3 -m py_compile app.py

      - name: Build Docker image
        run: docker build -t docker-test .

      - name: Run Docker container
        run: docker run -d -p 8000:8000 docker-test

      - name: Wait for container
        run: sleep 5

      - name: Test HTTP endpoint
        run: curl http://localhost:8000 

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{github.actor}} --password-stdin

      - name: Push Docker image
        run: |
          docker tag docker-test ghcr.io/martinhelesic/docker-test:latest
          docker push ghcr.io/martinhelesic/docker-test:latest

